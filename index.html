<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Platform Pendaftaran Pendakian Gunung & Penyewaan Alat">
    <title>Summit Tracker | Pendakian & Sewa Alat</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen flex flex-col relative overflow-x-hidden selection:bg-brand-500 selection:text-white">

    <!-- Background Effects -->
    <div class="fixed inset-0 z-[-1] bg-grid-pattern opacity-[0.03]"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-500/20 blur-[120px] z-[-1]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] z-[-1]"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-nav border-b border-white/10 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3 cursor-pointer" onclick="app.navigate('home')">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
                        <i class="fa-solid fa-mountain-sun text-white text-xl"></i>
                    </div>
                    <span class="font-bold text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Summit.</span>
                </div>
                <div class="hidden md:flex space-x-1 nav-links">
                    <button onclick="app.navigate('home')" class="nav-btn active px-4 py-2 rounded-lg font-medium transition-all hover:bg-white/5 hover:text-white text-slate-300">Beranda</button>
                    <button onclick="app.navigate('register')" class="nav-btn px-4 py-2 rounded-lg font-medium transition-all hover:bg-white/5 hover:text-white text-slate-300">Pendakian</button>
                    <button onclick="app.navigate('rental')" class="nav-btn px-4 py-2 rounded-lg font-medium transition-all hover:bg-white/5 hover:text-white text-slate-300">Sewa Alat</button>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="app.navigate('admin')" class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg border border-white/10 hover:border-brand-500/50 hover:bg-brand-500/10 transition-all text-sm font-medium">
                        <i class="fa-solid fa-shield-halved text-brand-500"></i> Admin Panel
                    </button>
                    <!-- Mobile Menu Button -->
                    <button class="md:hidden text-slate-300 hover:text-white p-2" onclick="app.toggleMobileMenu()">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-2 border-t border-white/10 pt-4">
                <button onclick="app.navigate('home'); app.toggleMobileMenu()" class="nav-btn-mobile w-full text-left px-4 py-2 rounded-lg font-medium transition-all text-slate-300 hover:bg-white/5">Beranda</button>
                <button onclick="app.navigate('register'); app.toggleMobileMenu()" class="nav-btn-mobile w-full text-left px-4 py-2 rounded-lg font-medium transition-all text-slate-300 hover:bg-white/5">Pendakian</button>
                <button onclick="app.navigate('rental'); app.toggleMobileMenu()" class="nav-btn-mobile w-full text-left px-4 py-2 rounded-lg font-medium transition-all text-slate-300 hover:bg-white/5">Sewa Alat</button>
                <button onclick="app.navigate('admin'); app.toggleMobileMenu()" class="nav-btn-mobile w-full text-left px-4 py-2 rounded-lg font-medium transition-all text-brand-400 hover:bg-white/5"><i class="fa-solid fa-shield-halved"></i> Admin Panel</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow pt-24 pb-12 w-full relative z-10" id="main-content">
        <!-- Views will be injected here by JS -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 bg-slate-950/50 backdrop-blur-md mt-auto z-10 relative">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 text-center text-slate-400 text-sm">
            <p>&copy; 2026 Summit Tracker. Dirancang untuk para pendaki.</p>
        </div>
    </footer>

    <!-- Templates -->
    
    <!-- TEMPLATE: HOME -->
    <template id="tpl-home">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-24 animate-fade-in">
            <!-- Hero Section with Video Banner -->
            <section class="relative w-full h-[60vh] md:h-[70vh] rounded-3xl overflow-hidden mt-8 flex flex-col items-center justify-center text-center shadow-2xl bg-black">
                <!-- Video Background (TikTok iframe) -->
                <iframe 
                    src="https://www.tiktok.com/embed/v2/7526370572545035526" 
                    class="absolute inset-0 w-full h-full object-cover z-0 opacity-60 pointer-events-none scale-150" 
                    allow="autoplay" 
                    frameborder="0">
                </iframe>
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/60 via-slate-950/40 to-slate-950 z-0 pointer-events-none"></div>
                
                <div class="relative z-10 px-4">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-500/20 border border-brand-500/30 text-white text-sm font-medium mb-6 backdrop-blur-md animate-slide-down">
                        <span class="w-2 h-2 rounded-full bg-brand-400 animate-pulse"></span>
                        Eksplorasi Gunung Dempo 2026
                    </div>
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 max-w-4xl leading-tight text-white drop-shadow-lg">
                        Taklukkan Puncak, <br/>
                        <span class="bg-clip-text text-transparent bg-gradient-to-r from-brand-300 to-blue-400">Mulai Petualanganmu.</span>
                    </h1>
                    <p class="text-lg md:text-xl text-slate-200 max-w-2xl mx-auto mb-10 leading-relaxed drop-shadow">
                        Platform resmi pendaftaran pendakian gunung dan penyewaan alat perlengkapan outdoor. Aman, mudah, dan terpercaya.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onclick="app.navigate('register')" class="px-8 py-4 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold text-lg shadow-lg shadow-brand-500/30 transition-all hover:-translate-y-1">
                            <i class="fa-solid fa-person-hiking mr-2"></i> Daftar Pendakian
                        </button>
                        <button onclick="app.navigate('rental')" class="px-8 py-4 rounded-xl bg-slate-900/60 backdrop-blur-md hover:bg-slate-800 border border-white/20 text-white font-semibold text-lg transition-all hover:-translate-y-1">
                            <i class="fa-solid fa-tent mr-2"></i> Sewa Alat
                        </button>
                    </div>
                </div>
            </section>

            <!-- Mountains List / Media Gallery -->
            <section>
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h2 class="text-3xl font-bold mb-2">Jelajahi Keindahan Gunung Dempo</h2>
                        <p class="text-slate-400">Rasakan sensasi pendakian di puncak tertinggi Sumatera Selatan.</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Main Featured Card (Col span 2) -->
                    <div class="lg:col-span-2 glass-card rounded-3xl overflow-hidden relative group h-[400px]">
                        <img src="https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&w=1200&q=80" alt="Puncak Gunung Dempo" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/20 to-transparent"></div>
                        <div class="absolute bottom-0 left-0 p-8 w-full flex justify-between items-end">
                            <div>
                                <div class="inline-block px-3 py-1 bg-brand-500/20 border border-brand-500/30 text-brand-300 rounded-full text-xs font-bold mb-3 backdrop-blur-md">3.173 MDPL</div>
                                <h3 class="text-3xl font-bold text-white mb-2">Puncak Dempo</h3>
                                <p class="text-slate-300 text-sm"><i class="fa-solid fa-location-dot mr-2 text-brand-400"></i>Pagar Alam, Sumatera Selatan</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-white mb-1">Rp 25.000</div>
                                <div class="text-sm text-slate-300">Sisa Kuota: <span class="text-brand-400 font-bold">120</span></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Video Thumbnail -->
                    <div class="glass-card rounded-3xl overflow-hidden relative group h-[400px] cursor-pointer flex items-center justify-center">
                        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=600&q=80" alt="Video Dempo" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity group-hover:scale-105 duration-700">
                        <div class="absolute inset-0 bg-black/30"></div>
                        <div class="relative z-10 w-20 h-20 bg-brand-500/80 hover:bg-brand-500 rounded-full flex items-center justify-center backdrop-blur-sm shadow-[0_0_30px_rgba(16,185,129,0.5)] transition-all group-hover:scale-110">
                            <i class="fa-solid fa-play text-white text-3xl ml-1"></i>
                        </div>
                        <div class="absolute bottom-6 left-0 w-full text-center">
                            <p class="font-bold text-white drop-shadow-md">Tonton Video Detail Pendakian</p>
                        </div>
                    </div>
                </div>

                <!-- Image Slider -->
                <div class="mt-6 flex gap-4 overflow-x-auto pb-4 custom-scrollbar snap-x snap-mandatory">
                    <div class="min-w-[280px] h-[180px] rounded-2xl overflow-hidden relative snap-start">
                        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500" alt="Kawah Merapi">
                        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur text-white text-xs px-2 py-1 rounded">Kawah Merapi Dempo</div>
                    </div>
                    <div class="min-w-[280px] h-[180px] rounded-2xl overflow-hidden relative snap-start">
                        <img src="https://images.unsplash.com/photo-1542302302-7634f1dbde98?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500" alt="Kebun Teh">
                        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur text-white text-xs px-2 py-1 rounded">Hamparan Kebun Teh</div>
                    </div>
                    <div class="min-w-[280px] h-[180px] rounded-2xl overflow-hidden relative snap-start">
                        <img src="https://images.unsplash.com/photo-1483728642387-6c3bf6c602c8?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500" alt="Hutan Lumut">
                        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur text-white text-xs px-2 py-1 rounded">Jalur Hutan Lumut</div>
                    </div>
                    <div class="min-w-[280px] h-[180px] rounded-2xl overflow-hidden relative snap-start">
                        <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500" alt="Sunrise">
                        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur text-white text-xs px-2 py-1 rounded">Sunrise Puncak Dempo</div>
                    </div>
                </div>
            </section>

            <!-- Testimonials -->
            <section class="pb-20">
                <h2 class="text-3xl font-bold mb-10 text-center">Apa Kata Mereka</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-2xl relative">
                        <i class="fa-solid fa-quote-right absolute top-6 right-6 text-4xl text-white/5"></i>
                        <div class="flex gap-1 text-yellow-400 mb-4">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <p class="text-slate-300 mb-6 relative z-10">"Sistem pendaftaran sangat mudah dan transparan. Alat yang disewa juga kualitasnya masih sangat bagus!"</p>
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=Rudi+H&background=random" class="w-10 h-10 rounded-full" alt="User">
                            <div>
                                <h4 class="font-semibold text-sm">Rudi Hermawan</h4>
                                <span class="text-xs text-slate-400">Pendaki Gn. Rinjani</span>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl relative">
                        <i class="fa-solid fa-quote-right absolute top-6 right-6 text-4xl text-white/5"></i>
                        <div class="flex gap-1 text-yellow-400 mb-4">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
                        </div>
                        <p class="text-slate-300 mb-6 relative z-10">"Fitur peringatan cuaca sangat membantu kami merencanakan waktu muncak. Basecamp juga sangat responsif."</p>
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=Siska&background=random" class="w-10 h-10 rounded-full" alt="User">
                            <div>
                                <h4 class="font-semibold text-sm">Siska Amelia</h4>
                                <span class="text-xs text-slate-400">Pendaki Gn. Semeru</span>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl relative">
                        <i class="fa-solid fa-quote-right absolute top-6 right-6 text-4xl text-white/5"></i>
                        <div class="flex gap-1 text-yellow-400 mb-4">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <p class="text-slate-300 mb-6 relative z-10">"Carrier dan tenda yang disewa kondisinya prima. Harga sewanya juga masuk akal. Sangat direkomendasikan!"</p>
                        <div class="flex items-center gap-3">
                            <img src="https://ui-avatars.com/api/?name=Bagas+P&background=random" class="w-10 h-10 rounded-full" alt="User">
                            <div>
                                <h4 class="font-semibold text-sm">Bagas Prakoso</h4>
                                <span class="text-xs text-slate-400">Pendaki Gn. Merbabu</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </template>

    <!-- TEMPLATE: REGISTER -->
    <template id="tpl-register">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 animate-fade-in pb-20">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold mb-4">Registrasi Pendakian</h1>
                <p class="text-slate-400">Lengkapi data diri dan rombongan untuk mendapatkan izin pendakian (SIMAKSI).</p>
            </div>

            <!-- Weather Warning Widget -->
            <div class="mb-8 p-4 rounded-xl bg-orange-500/10 border border-orange-500/30 flex gap-4 items-start animate-pulse-slow">
                <div class="mt-1 p-2 bg-orange-500/20 rounded-lg text-orange-400">
                    <i class="fa-solid fa-cloud-bolt text-xl"></i>
                </div>
                <div>
                    <h3 class="font-bold text-orange-400 mb-1">Peringatan Dini Cuaca</h3>
                    <p class="text-sm text-slate-300">Diperkirakan hujan lebat disertai angin kencang di beberapa wilayah pegunungan Jawa Tengah pada akhir pekan ini. Persiapkan jas hujan dan peralatan kedap air.</p>
                </div>
            </div>

            <form id="form-registration" class="space-y-8" onsubmit="app.submitRegistration(event)">
                <!-- Form Pemesanan Paket Eksplorasi -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Form Section -->
                    <div class="lg:col-span-2 glass-card p-6 md:p-8 rounded-2xl">
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-3 border-b border-white/10 pb-4">
                            <i class="fa-solid fa-box-open text-brand-500"></i> 1. Pemesanan Paket Eksplorasi Dempo
                        </h3>
                        
                        <div class="space-y-6">
                            <!-- Paket / Via Pendakian -->
                            <div class="space-y-3">
                                <label class="text-sm font-medium text-slate-300">Pilih VIA Pendakian</label>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <label class="flex items-start gap-3 p-4 rounded-xl border border-white/10 bg-slate-900/50 cursor-pointer hover:border-brand-500/50 transition-all">
                                        <input type="radio" name="paket" value="kampung4" class="mt-1 w-4 h-4 text-brand-500 bg-slate-800 border-gray-600 focus:ring-brand-500 focus:ring-2" checked>
                                        <div>
                                            <span class="block font-bold text-white mb-1 text-sm">Jalur Kampung IV</span>
                                            <span class="text-xs text-slate-400">Jalur favorit via basecamp utama.</span>
                                        </div>
                                    </label>
                                    <label class="flex items-start gap-3 p-4 rounded-xl border border-white/10 bg-slate-900/50 cursor-pointer hover:border-brand-500/50 transition-all">
                                        <input type="radio" name="paket" value="tugurimau" class="mt-1 w-4 h-4 text-brand-500 bg-slate-800 border-gray-600 focus:ring-brand-500 focus:ring-2">
                                        <div>
                                            <span class="block font-bold text-white mb-1 text-sm">Jalur Tugu Rimau</span>
                                            <span class="text-xs text-slate-400">Akses pendakian rute menantang.</span>
                                        </div>
                                    </label>
                                    <label class="flex items-start gap-3 p-4 rounded-xl border border-white/10 bg-slate-900/50 cursor-pointer hover:border-brand-500/50 transition-all">
                                        <input type="radio" name="paket" value="jarai" class="mt-1 w-4 h-4 text-brand-500 bg-slate-800 border-gray-600 focus:ring-brand-500 focus:ring-2">
                                        <div>
                                            <span class="block font-bold text-white mb-1 text-sm">Jalur Jarai (Lahat)</span>
                                            <span class="text-xs text-slate-400">Jalur alternatif dari sisi utara.</span>
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <!-- Tanggal & Kuota -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-sm font-medium text-slate-300">Pilih Tanggal</label>
                                    <input type="date" id="reg-tgl-naik" required class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-brand-500 outline-none color-scheme-dark" onchange="app.checkQuota()">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-medium text-slate-300">Indikator Kuota</label>
                                    <div id="quota-status" class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-slate-400 flex items-center justify-between">
                                        <span>Pilih tanggal untuk cek</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Preview Visual -->
                    <div class="lg:col-span-1 glass-card p-4 rounded-2xl flex flex-col">
                        <h4 class="font-bold mb-3 text-sm text-slate-300">Preview Jalur & Pemandangan</h4>
                        <div class="flex-grow rounded-xl overflow-hidden relative group min-h-[200px]">
                            <!-- Simple Swipe Gallery (CSS Scroll Snap) -->
                            <div class="flex w-full h-full overflow-x-auto snap-x snap-mandatory custom-scrollbar" style="scrollbar-width: none;">
                                <img src="https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover flex-shrink-0 snap-center" alt="Preview 1">
                                <img src="https://images.unsplash.com/photo-1542302302-7634f1dbde98?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover flex-shrink-0 snap-center" alt="Preview 2">
                                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover flex-shrink-0 snap-center" alt="Preview 3">
                            </div>
                            <div class="absolute bottom-3 w-full flex justify-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-white/80"></span>
                                <span class="w-2 h-2 rounded-full bg-white/40"></span>
                                <span class="w-2 h-2 rounded-full bg-white/40"></span>
                            </div>
                        </div>
                        <p class="text-xs text-center text-slate-400 mt-3"><i class="fa-solid fa-arrows-left-right mr-1"></i> Geser untuk melihat foto</p>
                    </div>
                </div>

                <!-- Data Ketua -->
                <div class="glass-card p-6 md:p-8 rounded-2xl">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-3 border-b border-white/10 pb-4">
                        <i class="fa-solid fa-user-shield text-brand-500"></i> 2. Data Ketua Kelompok
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">Nama Lengkap</label>
                            <input type="text" id="reg-nama" required placeholder="Sesuai KTP" class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-brand-500 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">NIK / Paspor</label>
                            <input type="text" id="reg-nik" required placeholder="16 Digit" class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-brand-500 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-300">No. HP / WhatsApp</label>
                            <input type="tel" id="reg-hp" required placeholder="08..." class="w-full bg-slate-900/50 border border-white/10 rounded-lg p-3 text-white focus:ring-2 focus:ring-brand-500 outline-none">

                            <button type="button" onclick="app.closePaymentModal()" class="px-4 py-2 rounded-lg font-medium border border-white/10 hover:bg-white/5 transition-all w-full">Nanti Saja</button>
                            <button type="submit" class="px-4 py-2 rounded-lg font-bold bg-brand-600 hover:bg-brand-500 text-white shadow-lg shadow-brand-500/30 transition-all w-full">Konfirmasi</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </template>

    <!-- Admin Login Modal -->
    <div id="admin-login-modal" class="hidden fixed inset-0 z-[150] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="app.closeAdminLoginModal()"></div>
        <div class="relative w-full max-w-sm glass-card rounded-3xl p-8 shadow-2xl shadow-brand-500/10 animate-slide-down border border-white/10 text-center">
            <div class="w-20 h-20 bg-brand-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-halved text-4xl text-brand-400"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2 tracking-tight">Keamanan Sistem</h3>
            <p class="text-slate-400 text-sm mb-6">Masukkan kata sandi untuk mengakses kontrol Admin.</p>
            <form onsubmit="app.submitAdminLogin(event)">
                <div class="relative mb-6">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="admin-password-input" required placeholder="Kata Sandi" class="w-full bg-slate-900/60 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white focus:ring-2 focus:ring-brand-500 outline-none transition-all placeholder:text-slate-500">
                </div>
                <div class="flex flex-col gap-3">
                    <button type="submit" class="w-full py-3.5 rounded-xl font-bold bg-brand-600 hover:bg-brand-500 text-white shadow-lg shadow-brand-500/30 transition-all">Verifikasi Akses</button>
                    <button type="button" onclick="app.closeAdminLoginModal()" class="w-full py-3.5 rounded-xl font-medium text-slate-400 hover:text-white hover:bg-white/5 transition-all">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[200] flex flex-col gap-2"></div>

    <script src="script.js"></script>
</body>
</html>
